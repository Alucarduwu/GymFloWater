name: gymflow
description: Tu app personal de gym - registra, avanza, domina.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  # State Management
  provider: ^6.1.2
  # Charts
  fl_chart: ^0.69.0
  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  # Icons & UI
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
